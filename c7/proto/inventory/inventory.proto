syntax = "proto3";

package inventory;

import "proto/common/common.proto";

option go_package = "e-commerce-inventory-price/proto/inventory";

service InventoryService {
  rpc GetInventory(common.Product) returns (InventoryResponse);
  rpc ReserveInventory(ReserveRequest) returns (ReserveResponse);
}

message Warehouse {
  string id = 1;
  string name = 2;
  int32 stock = 3;
  string location = 4;
}

message InventoryResponse {
  int32 total = 1;
  repeated Warehouse warehouses = 2;
}

message ReserveRequest {
  string product_id = 1;
  int32 quantity = 2;
  string order_id = 3;
}

message ReserveResponse {
  bool success = 1;
  string message = 2;
  map<string, int32> allocated_warehouses = 3;
}
