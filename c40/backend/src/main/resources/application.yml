server:
  port: 8080

spring:
  redis:
    host: localhost
    port: 6379
    database: 0
  data:
    mongodb:
      host: localhost
      port: 27017
      database: device_monitor

mqtt:
  broker: tcp://localhost:1883
  client-id: device-monitor-consumer
  topic: devices/data
  username: 
  password: 

influxdb:
  url: http://localhost:8086
  token: my-token
  org: my-org
  bucket: device-data

prediction:
  threshold: 80.0
  history-hours: 24
  forecast-minutes: 60
  prediction-interval-minutes: 5

logging:
  level:
    com.iot.monitor: INFO
