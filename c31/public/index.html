<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实时协作白板</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="loginScreen" class="screen">
      <div class="login-container">
        <h1>实时协作白板</h1>
        <div class="tab-buttons">
          <button class="tab-btn active" id="createTab">创建房间</button>
          <button class="tab-btn" id="joinTab">加入房间</button>
        </div>
        
        <div id="createForm" class="form-container">
          <div class="form-group">
            <label>您的昵称</label>
            <input type="text" id="createNickname" placeholder="请输入昵称" maxlength="20">
          </div>
          <button class="btn btn-primary" id="createRoomBtn">创建房间</button>
        </div>
        
        <div id="joinForm" class="form-container hidden">
          <div class="form-group">
            <label>房间号（6位数字）</label>
            <input type="text" id="joinRoomId" placeholder="请输入6位房间号" maxlength="6">
          </div>
          <div class="form-group">
            <label>您的昵称</label>
            <input type="text" id="joinNickname" placeholder="请输入昵称" maxlength="20">
          </div>
          <button class="btn btn-primary" id="joinRoomBtn">加入房间</button>
        </div>
        
        <div id="errorMessage" class="error-message hidden"></div>
      </div>
    </div>
    
    <div id="whiteboardScreen" class="screen hidden">
      <div class="toolbar">
        <div class="room-info">
          <span>房间号: <strong id="roomIdDisplay"></strong></span>
          <button class="btn btn-secondary" id="copyRoomId">复制</button>
          <button class="btn btn-danger" id="leaveRoom">离开</button>
        </div>
        <div class="tool-buttons">
          <button class="tool-btn active" data-tool="free" title="自由手绘">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 11.5c0-3.31-3-6-6-6s-6 2.69-6 6c0 3.12 2.56 6 6 6 1.77 0 3.22-1.33 4-3"/>
              <path d="M15 4.5c.89 1.33 1 2.67 1 4"/>
              <path d="M14 18c1 0 2-1 2-3"/>
            </svg>
          </button>
          <button class="tool-btn" data-tool="rect" title="矩形">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
            </svg>
          </button>
          <button class="tool-btn" data-tool="circle" title="圆形">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="9"/>
            </svg>
          </button>
          <button class="tool-btn" data-tool="text" title="文字">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 7V4h16v3"/>
              <path d="M9 20h6"/>
              <path d="M12 4v16"/>
            </svg>
          </button>
          <button class="tool-btn" data-tool="eraser" title="橡皮擦(仅擦除自己的)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 20h-4l-1-1H6a2 2 0 0 1-2-2v-1.394a2 2 0 0 1 .244-.964l8.713-11.617a2 2 0 0 1 3.098-.07l3.61 3.512a2 2 0 0 1 .064 2.816L20 20z"/>
            </svg>
          </button>
          <button class="tool-btn" data-tool="select" title="选区+评论">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <circle cx="15.5" cy="8.5" r="1.5"/>
              <circle cx="8.5" cy="15.5" r="1.5"/>
              <circle cx="15.5" cy="15.5" r="1.5"/>
            </svg>
          </button>
          <div class="divider"></div>
          <div class="color-picker">
            <label>颜色:</label>
            <input type="color" id="strokeColor" value="#000000">
          </div>
          <div class="line-width">
            <label>粗细:</label>
            <input type="range" id="strokeWidth" min="1" max="20" value="3">
          </div>
        </div>
      </div>
      
      <div class="whiteboard-container">
        <div id="canvasWrapper" class="canvas-wrapper">
          <canvas id="whiteboard" width="1000" height="600"></canvas>
          <div id="cursorLayer" class="cursor-layer"></div>
          <div id="selectionLayer" class="selection-layer hidden"></div>
          <div id="commentsLayer" class="comments-layer"></div>
          <div id="textInputContainer" class="text-input-container hidden">
            <textarea id="textInput" placeholder="输入文字..."></textarea>
            <div class="text-input-buttons">
              <button class="btn btn-primary" id="confirmText">确定</button>
              <button class="btn btn-secondary" id="cancelText">取消</button>
            </div>
          </div>
          <div id="commentModal" class="comment-modal hidden">
            <div class="comment-modal-content">
              <h3>添加评论</h3>
              <div class="comment-preview">
                <img id="commentPreview" alt="选区预览">
              </div>
              <textarea id="commentText" placeholder="输入您的评论..."></textarea>
              <div class="comment-buttons">
                <button class="btn btn-secondary" id="cancelComment">取消</button>
                <button class="btn btn-primary" id="submitComment">添加评论</button>
              </div>
            </div>
          </div>
          <div id="zoomOverlay" class="zoom-overlay hidden">
            <div class="zoom-container">
              <div class="zoom-header">
                <span id="zoomTitle">评论区域</span>
                <button class="close-zoom" id="closeZoom">×</button>
              </div>
              <div class="zoom-content">
                <img id="zoomImage" alt="放大区域">
                <div class="zoom-comment">
                  <div class="comment-author"></div>
                  <div class="comment-text"></div>
                  <div class="comment-time"></div>
                </div>
                <button class="btn btn-danger hidden" id="deleteComment">删除评论</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <div class="users-panel">
        <h3>在线用户</h3>
        <div id="usersList"></div>
      </div>
    </div>
  </div>
  
  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
