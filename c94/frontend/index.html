<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏玩家行为数据分析系统 - 增强版</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px 40px;
            border-bottom: 2px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
        }

        .nav-tab {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #e0e0e0;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .nav-tab:hover, .nav-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .filters {
            padding: 20px 40px;
            background: rgba(15, 52, 96, 0.3);
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            color: #aaa;
            font-size: 14px;
        }

        .filter-group select,
        .filter-group input {
            background: #1a1a2e;
            border: 1px solid #667eea;
            color: #e0e0e0;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .dashboard {
            padding: 20px 40px;
        }

        .dashboard-panel {
            display: none;
        }

        .dashboard-panel.active {
            display: block;
        }

        .grid-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-row-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .full-width {
            grid-column: span 1;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(102, 126, 234, 0.3);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 14px;
            color: #aaa;
        }

        .stat-card .trend {
            font-size: 12px;
            margin-top: 5px;
        }

        .stat-card .trend.up {
            color: #4ade80;
        }

        .stat-card .trend.down {
            color: #f87171;
        }

        .chart-card {
            background: rgba(26, 26, 46, 0.8);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .chart-card h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-card h3::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .chart-container {
            width: 100%;
            height: 350px;
        }

        .heatmap-container {
            height: 500px;
        }

        .alert-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .alert-item {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .alert-item:hover {
            background: rgba(248, 113, 113, 0.2);
        }

        .alert-item.critical {
            border-left: 4px solid #f87171;
        }

        .alert-item.warning {
            border-left: 4px solid #fbbf24;
        }

        .alert-item .player {
            font-weight: bold;
            color: #f87171;
            font-size: 16px;
        }

        .alert-item .rule {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            margin-left: 10px;
        }

        .alert-item .time {
            color: #888;
            font-size: 12px;
            margin-top: 8px;
        }

        .alert-item .details {
            color: #aaa;
            font-size: 13px;
            margin-top: 5px;
        }

        .rule-card {
            background: rgba(26, 26, 46, 0.8);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .rule-card .rule-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .rule-card .rule-name {
            font-weight: bold;
            color: #667eea;
        }

        .rule-card .rule-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }

        .rule-card .rule-status.enabled {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        .rule-card .rule-status.disabled {
            background: rgba(156, 163, 175, 0.2);
            color: #9ca3af;
        }

        .rule-card .rule-desc {
            color: #888;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .rule-card .rule-actions {
            display: flex;
            gap: 10px;
        }

        .rule-card .rule-actions button {
            padding: 5px 12px;
            font-size: 12px;
        }

        .comparison-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .comparison-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(102, 126, 234, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .comparison-item:hover, .comparison-item.selected {
            background: rgba(102, 126, 234, 0.3);
        }

        .comparison-item .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #667eea;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: #667eea;
        }

        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 24px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: #2a2a4e;
            border: 1px solid #667eea;
            color: #e0e0e0;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 1200px) {
            .grid-row {
                grid-template-columns: repeat(2, 1fr);
            }
            .chart-row, .chart-row-3 {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .grid-row {
                grid-template-columns: 1fr;
            }
            .filters {
                padding: 15px 20px;
            }
            .dashboard {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 游戏玩家行为数据分析系统</h1>
        <div class="nav-tabs">
            <button class="nav-tab active" data-panel="overview">📊 总览</button>
            <button class="nav-tab" data-panel="heatmap">🗺️ 热力图</button>
            <button class="nav-tab" data-panel="comparison">📈 对比分析</button>
            <button class="nav-tab" data-panel="anomaly">⚠️ 异常检测</button>
            <button class="nav-tab" data-panel="rules">⚙️ 规则配置</button>
        </div>
    </div>

    <div class="filters">
        <div class="filter-group">
            <label>时间范围:</label>
            <select id="timeRange">
                <option value="1">最近1小时</option>
                <option value="6">最近6小时</option>
                <option value="24" selected>最近24小时</option>
                <option value="168">最近7天</option>
            </select>
        </div>
        <div class="filter-group">
            <label>热力图精度:</label>
            <select id="gridSize">
                <option value="2">高 (2单位)</option>
                <option value="5" selected>中 (5单位)</option>
                <option value="10">低 (10单位)</option>
            </select>
        </div>
        <button class="btn" onclick="refreshAllData()">🔄 刷新数据</button>
    </div>

    <div class="dashboard">
        <!-- 总览面板 -->
        <div id="panel-overview" class="dashboard-panel active">
            <div class="grid-row">
                <div class="stat-card">
                    <div class="value" id="totalPlayers">0</div>
                    <div class="label">活跃玩家数</div>
                    <div class="trend up">↑ 12.5%</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="totalMovements">0</div>
                    <div class="label">移动数据点</div>
                    <div class="trend up">↑ 8.3%</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="totalSkills">0</div>
                    <div class="label">技能使用次数</div>
                    <div class="trend up">↑ 5.2%</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="totalAnomalies">0</div>
                    <div class="label">异常行为</div>
                    <div class="trend down">↓ 3.1%</div>
                </div>
            </div>

            <div class="chart-row">
                <div class="chart-card">
                    <h3>热门地图访问统计</h3>
                    <div id="popularMapsChart" class="chart-container"></div>
                </div>
                <div class="chart-card">
                    <h3>技能使用分布</h3>
                    <div id="skillDistributionChart" class="chart-container"></div>
                </div>
            </div>

            <div class="chart-row">
                <div class="chart-card">
                    <h3>任务完成情况</h3>
                    <div id="taskCompletionChart" class="chart-container"></div>
                </div>
                <div class="chart-card">
                    <h3>最近异常告警</h3>
                    <div id="recentAlertsList" class="alert-list">
                        <div style="text-align: center; color: #888; padding: 40px;">加载中...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 热力图面板 -->
        <div id="panel-heatmap" class="dashboard-panel">
            <div class="filter-group" style="margin-bottom: 20px;">
                <label>选择地图:</label>
                <select id="heatmapMapSelect" onchange="loadHeatmapData()">
                    <option value="">选择地图...</option>
                </select>
            </div>
            <div class="chart-card full-width">
                <h3>玩家移动热力图</h3>
                <div id="heatmapChart" class="chart-container heatmap-container"></div>
            </div>
        </div>

        <!-- 对比分析面板 -->
        <div id="panel-comparison" class="dashboard-panel">
            <div class="chart-card">
                <h3>服务器对比选择</h3>
                <div class="comparison-selector" id="serverComparisonSelector">
                </div>
            </div>

            <div class="chart-row-3">
                <div class="chart-card">
                    <h3>移动数据量对比</h3>
                    <div id="serverMovementComparisonChart" class="chart-container"></div>
                </div>
                <div class="chart-card">
                    <h3>技能使用对比</h3>
                    <div id="serverSkillComparisonChart" class="chart-container"></div>
                </div>
                <div class="chart-card">
                    <h3>任务完成对比</h3>
                    <div id="serverTaskComparisonChart" class="chart-container"></div>
                </div>
            </div>

            <div class="chart-row">
                <div class="chart-card">
                    <h3>异常行为对比</h3>
                    <div id="serverAnomalyComparisonChart" class="chart-container"></div>
                </div>
                <div class="chart-card">
                    <h3>平均移动速度对比</h3>
                    <div id="serverSpeedComparisonChart" class="chart-container"></div>
                </div>
            </div>

            <div class="chart-card">
                <h3>等级段对比</h3>
                <div class="comparison-selector" id="levelComparisonSelector">
                </div>
                <div id="levelComparisonChart" class="chart-container"></div>
            </div>
        </div>

        <!-- 异常检测面板 -->
        <div id="panel-anomaly" class="dashboard-panel">
            <div class="chart-row">
                <div class="chart-card">
                    <h3>异常类型分布</h3>
                    <div id="anomalyTypeChart" class="chart-container"></div>
                </div>
                <div class="chart-card">
                    <h3>异常严重程度分布</h3>
                    <div id="anomalySeverityChart" class="chart-container"></div>
                </div>
            </div>

            <div class="chart-card">
                <h3>异常告警列表</h3>
                <div id="allAlertsList" class="alert-list">
                    <div style="text-align: center; color: #888; padding: 40px;">加载中...</div>
                </div>
            </div>
        </div>

        <!-- 规则配置面板 -->
        <div id="panel-rules" class="dashboard-panel">
            <div style="margin-bottom: 20px;">
                <button class="btn" onclick="openRuleModal()">+ 新建规则</button>
            </div>

            <div id="rulesList">
                <div style="text-align: center; color: #888; padding: 40px;">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 规则编辑弹窗 -->
    <div id="ruleModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑检测规则</h3>
                <button class="modal-close" onclick="closeRuleModal()">&times;</button>
            </div>
            <form id="ruleForm">
                <input type="hidden" id="ruleId">
                <div class="form-group">
                    <label>规则名称</label>
                    <input type="text" id="ruleName" placeholder="输入规则名称">
                </div>
                <div class="form-group">
                    <label>规则编码</label>
                    <input type="text" id="ruleCode" placeholder="例如: SPEED_HACK_01">
                </div>
                <div class="form-group">
                    <label>规则描述</label>
                    <textarea id="ruleDescription" rows="3" placeholder="描述检测逻辑"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>行为类型</label>
                        <select id="behaviorType">
                            <option value="MOVEMENT">移动检测</option>
                            <option value="SKILL_USE">技能检测</option>
                            <option value="TASK">任务检测</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>严重程度</label>
                        <select id="severity">
                            <option value="1">提示</option>
                            <option value="2">警告</option>
                            <option value="3">严重</option>
                            <option value="4">致命</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>检测条件 (JSON格式)</label>
                    <textarea id="conditionJson" rows="6" placeholder='{"field": "moveSpeed", "operator": ">", "value": 20}'></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>启用状态</label>
                        <select id="ruleEnabled">
                            <option value="true">启用</option>
                            <option value="false">禁用</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>触发告警</label>
                        <select id="triggerAlert">
                            <option value="true">是</option>
                            <option value="false">否</option>
                        </select>
                    </div>
                </div>
                <div style="text-align: right; margin-top: 20px;">
                    <button type="button" class="btn" style="background: #666;" onclick="closeRuleModal()">取消</button>
                    <button type="submit" class="btn" style="margin-left: 10px;">保存规则</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        const COLORS = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#43e97b', '#fa709a'];

        let charts = {};
        let selectedServers = [];
        let selectedLevels = [10, 30, 50, 70];
        let allServers = [];
        let allMaps = [];
        let allRules = [];

        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            initNavigation();
            initRuleForm();
            loadInitialData();
        });

        function initCharts() {
            const chartConfigs = [
                { id: 'popularMapsChart', type: 'bar' },
                { id: 'skillDistributionChart', type: 'pie' },
                { id: 'taskCompletionChart', type: 'barHorizontal' },
                { id: 'heatmapChart', type: 'scatter' },
                { id: 'serverMovementComparisonChart', type: 'bar' },
                { id: 'serverSkillComparisonChart', type: 'bar' },
                { id: 'serverTaskComparisonChart', type: 'bar' },
                { id: 'serverAnomalyComparisonChart', type: 'bar' },
                { id: 'serverSpeedComparisonChart', type: 'bar' },
                { id: 'levelComparisonChart', type: 'radar' },
                { id: 'anomalyTypeChart', type: 'pie' },
                { id: 'anomalySeverityChart', type: 'pie' }
            ];

            chartConfigs.forEach(config => {
                const el = document.getElementById(config.id);
                if (el) {
                    charts[config.id] = echarts.init(el);
                }
            });

            window.addEventListener('resize', () => {
                Object.values(charts).forEach(chart => chart && chart.resize());
            });
        }

        function initNavigation() {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.dashboard-panel').forEach(p => p.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById('panel-' + this.dataset.panel).classList.add('active');

                    setTimeout(() => {
                        Object.values(charts).forEach(chart => chart && chart.resize());
                    }, 100);
                });
            });
        }

        function initRuleForm() {
            document.getElementById('ruleForm').addEventListener('submit', function(e) {
                e.preventDefault();
                saveRule();
            });
        }

        async function loadInitialData() {
            try {
                await Promise.all([
                    loadFilters(),
                    loadOverviewData(),
                    loadRules(),
                    loadAlerts()
                ]);

                initServerComparisonSelector();
                initLevelComparisonSelector();
            } catch (e) {
                console.error('初始化数据失败:', e);
            }
        }

        async function loadFilters() {
            try {
                const [servers, maps] = await Promise.all([
                    fetch(`${API_BASE}/behavior/servers`).then(r => r.json()),
                    fetch(`${API_BASE}/behavior/maps`).then(r => r.json())
                ]);

                allServers = servers;
                allMaps = maps;

                const mapSelect = document.getElementById('heatmapMapSelect');
                maps.forEach(map => {
                    const option = document.createElement('option');
                    option.value = map;
                    option.textContent = map;
                    mapSelect.appendChild(option);
                });

                if (maps.length > 0) {
                    mapSelect.value = maps[0];
                    loadHeatmapData();
                }
            } catch (e) {
                console.error('加载筛选器失败:', e);
            }
        }

        function initServerComparisonSelector() {
            const selector = document.getElementById('serverComparisonSelector');
            selector.innerHTML = allServers.slice(0, 6).map((server, i) => `
                <div class="comparison-item ${i < 3 ? 'selected' : ''}" data-server="${server}" onclick="toggleServerSelection(this)">
                    <span class="color-dot" style="background: ${COLORS[i]}"></span>
                    <span>${server}</span>
                </div>
            `).join('');

            selectedServers = allServers.slice(0, 3);
            loadServerComparisonData();
        }

        function toggleServerSelection(element) {
            element.classList.toggle('selected');
            const server = element.dataset.server;
            if (element.classList.contains('selected')) {
                if (!selectedServers.includes(server)) selectedServers.push(server);
            } else {
                selectedServers = selectedServers.filter(s => s !== server);
            }
            loadServerComparisonData();
        }

        function initLevelComparisonSelector() {
            const selector = document.getElementById('levelComparisonSelector');
            selector.innerHTML = selectedLevels.map((level, i) => `
                <div class="comparison-item selected" data-level="${level}" onclick="toggleLevelSelection(this)">
                    <span class="color-dot" style="background: ${COLORS[i + 3]}"></span>
                    <span>等级 ${level}</span>
                </div>
            `).join('');

            loadLevelComparisonData();
        }

        function toggleLevelSelection(element) {
            element.classList.toggle('selected');
            const level = parseInt(element.dataset.level);
            if (element.classList.contains('selected')) {
                if (!selectedLevels.includes(level)) selectedLevels.push(level);
            } else {
                selectedLevels = selectedLevels.filter(l => l !== level);
            }
            loadLevelComparisonData();
        }

        async function loadOverviewData() {
            const hours = parseInt(document.getElementById('timeRange').value);
            await Promise.all([
                loadPopularMaps(hours),
                loadSkillDistribution(hours),
                loadTaskCompletion(hours),
                loadRecentAlerts(hours)
            ]);
        }

        async function loadPopularMaps(hours) {
            try {
                const data = await fetch(`${API_BASE}/stats/popular-maps?hours=${hours}`).then(r => r.json());

                const option = {
                    backgroundColor: 'transparent',
                    tooltip: { trigger: 'axis' },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: {
                        type: 'category',
                        data: data.map(d => d.mapId),
                        axisLine: { lineStyle: { color: '#667eea' } },
                        axisLabel: { color: '#aaa' }
                    },
                    yAxis: {
                        type: 'value',
                        axisLine: { lineStyle: { color: '#667eea' } },
                        axisLabel: { color: '#aaa' },
                        splitLine: { lineStyle: { color: 'rgba(102, 126, 234, 0.1)' } }
                    },
                    series: [{
                        type: 'bar',
                        data: data.map((d, i) => ({
                            value: d.count,
                            itemStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: COLORS[i % COLORS.length] },
                                    { offset: 1, color: COLORS[(i + 1) % COLORS.length] }
                                ]),
                                borderRadius: [4, 4, 0, 0]
                            }
                        })),
                        barWidth: '50%'
                    }]
                };

                charts.popularMapsChart.setOption(option);
            } catch (e) {
                console.error('加载热门地图失败:', e);
            }
        }

        async function loadSkillDistribution(hours) {
            try {
                const data = await fetch(`${API_BASE}/stats/popular-skills?hours=${hours}`).then(r => r.json());

                updateStats('totalSkills', data.reduce((sum, d) => sum + d.count, 0));

                const option = {
                    backgroundColor: 'transparent',
                    tooltip: { trigger: 'item' },
                    legend: {
                        orient: 'vertical',
                        right: '5%',
                        top: 'center',
                        textStyle: { color: '#aaa' }
                    },
                    series: [{
                        type: 'pie',
                        radius: ['40%', '70%'],
                        center: ['35%', '50%'],
                        avoidLabelOverlap: true,
                        itemStyle: { borderRadius: 10, borderColor: '#1a1a2e', borderWidth: 2 },
                        label: { show: true, color: '#aaa' },
                        data: data.map((d, i) => ({
                            value: d.count,
                            name: d.skillName,
                            itemStyle: { color: COLORS[i % COLORS.length] }
                        }))
                    }]
                };

                charts.skillDistributionChart.setOption(option);
            } catch (e) {
                console.error('加载技能分布失败:', e);
            }
        }

        async function loadTaskCompletion(hours) {
            try {
                const data = await fetch(`${API_BASE}/stats/task-completion?hours=${hours}`).then(r => r.json());

                const option = {
                    backgroundColor: 'transparent',
                    tooltip: { trigger: 'axis' },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: {
                        type: 'value',
                        axisLine: { lineStyle: { color: '#667eea' } },
                        axisLabel: { color: '#aaa' },
                        splitLine: { lineStyle: { color: 'rgba(102, 126, 234, 0.1)' } }
                    },
                    yAxis: {
                        type: 'category',
                        data: data.map(d => d.taskName),
                        axisLine: { lineStyle: { color: '#667eea' } },
                        axisLabel: { color: '#aaa' }
                    },
                    series: [{
                        type: 'bar',
                        data: data.map((d, i) => ({
                            value: d.completedCount,
                            itemStyle: {
                                color: new echarts.graphic.LinearGradient(1, 0, 0, 0, [
                                    { offset: 0, color: '#43e97b' },
                                    { offset: 1, color: '#38f9d7' }
                                ]),
                                borderRadius: [0, 4, 4, 0]
                            }
                        })),
                        barWidth: '50%'
                    }]
                };

                charts.taskCompletionChart.setOption(option);
            } catch (e) {
                console.error('加载任务完成数据失败:', e);
            }
        }

        async function loadHeatmapData() {
            try {
                const mapId = document.getElementById('heatmapMapSelect').value;
                if (!mapId) return;

                const hours = parseInt(document.getElementById('timeRange').value);
                const gridSize = parseFloat(document.getElementById('gridSize').value);

                const data = await fetch(`${API_BASE}/behavior/heatmap/${mapId}/aggregated?hours=${hours}&gridSize=${gridSize}`)
                    .then(r => r.json());

                updateStats('totalMovements', data.length);

                const points = data.map(d => [d.x, d.z, d.count, d.uniquePlayers]);
                const counts = data.map(d => d.count);
                const maxCount = Math.max(...counts, 1);

                const option = {
                    backgroundColor: 'transparent',
                    tooltip: {
                        formatter: function(params) {
                            return `
                                <div style="padding: 10px;">
                                    <div><strong>位置:</strong> (${params.data[0].toFixed(1)}, ${params.data[1].toFixed(1)})</div>
                                    <div><strong>访问次数:</strong> ${params.data[2]}</div>
                                    <div><strong>唯一玩家:</strong> ${params.data[3]}</div>
                                </div>
                            `;
                        }
                    },
                    visualMap: {
                        min: 1,
                        max: maxCount,
                        calculable: true,
                        orient: 'vertical',
                        right: '10%',
                        top: 'center',
                        inRange: {
                            color: ['#1a1a2e', '#667eea', '#764ba2', '#f093fb', '#f5576c']
                        },
                        textStyle: { color: '#aaa' }
                    },
                    xAxis: {
                        type: 'value',
                        name: 'X坐标',
                        nameTextStyle: { color: '#aaa' },
                        axisLine: { lineStyle: { color: '#667eea' } },
                        axisLabel: { color: '#aaa' },
                        splitLine: { lineStyle: { color: 'rgba(102, 126, 234, 0.1)' } }
                    },
                    yAxis: {
                        type: 'value',
                        name: 'Z坐标',
                        nameTextStyle: { color: '#aaa' },
                        axisLine: { lineStyle: { color: '#667eea' } },
                        axisLabel: { color: '#aaa' },
                        splitLine: { lineStyle: { color: 'rgba(102, 126, 234, 0.1)' } }
                    },
                    series: [{
                        type: 'effectScatter',
                        symbolSize: function(val) {
                            return Math.min(Math.max(val[2] * 2, 8), 50);
                        },
                        data: points,
                        rippleEffect: { brushType: 'stroke', scale: 3 },
                        itemStyle: {
                            shadowBlur: 10,
                            shadowColor: 'rgba(102, 126, 234, 0.5)'
                        }
                    }]
                };

                charts.heatmapChart.setOption(option);
            } catch (e) {
                console.error('加载热力图失败:', e);
            }
        }

        async function loadServerComparisonData() {
            if (selectedServers.length === 0) return;

            try {
                const hours = parseInt(document.getElementById('timeRange').value);
                const data = await fetch(`${API_BASE}/aggregate/comparison/servers?servers=${selectedServers.join(',')}&hours=${hours}`)
                    .then(r => r.json());

                const serverNames = Object.keys(data);

                const movementOption = {
                    backgroundColor: 'transparent',
                    tooltip: { trigger: 'axis' },
                    legend: { data: serverNames, textStyle: { color: '#aaa' } },
                    xAxis: { type: 'category', data: ['移动数据量'], axisLabel: { color: '#aaa' } },
                    yAxis: { type: 'value', axisLabel: { color: '#aaa' }, splitLine: { lineStyle: { color: 'rgba(102, 126, 234, 0.1)' } } },
                    series: serverNames.map((server, i) => ({
                        name: server,
                        type: 'bar',
                        data: [data[server].totalMovements],
                        itemStyle: { color: COLORS[i % COLORS.length], borderRadius: [4, 4, 0, 0] }
                    }))
                };
                charts.serverMovementComparisonChart.setOption(movementOption);

                const skillOption = { ...movementOption, xAxis: { type: 'category', data: ['技能使用'], axisLabel: { color: '#aaa' } } };
                skillOption.series = serverNames.map((server, i) => ({
                    name: server,
                    type: 'bar',
                    data: [data[server].totalSkills],
                    itemStyle: { color: COLORS[(i + 2) % COLORS.length], borderRadius: [4, 4, 0, 0] }
                }));
                charts.serverSkillComparisonChart.setOption(skillOption);

                const taskOption = { ...movementOption, xAxis: { type: 'category', data: ['任务完成'], axisLabel: { color: '#aaa' } } };
                taskOption.series = serverNames.map((server, i) => ({
                    name: server,
                    type: 'bar',
                    data: [data[server].totalTasks],
                    itemStyle: { color: COLORS[(i + 4) % COLORS.length], borderRadius: [4, 4, 0, 0] }
                }));
                charts.serverTaskComparisonChart.setOption(taskOption);

                const anomalyOption = { ...movementOption, xAxis: { type: 'category', data: ['异常数量'], axisLabel: { color: '#aaa' } } };
                anomalyOption.series = serverNames.map((server, i) => ({
                    name: server,
                    type: 'bar',
                    data: [data[server].totalAnomalies],
                    itemStyle: { color: COLORS[(i + 1) % COLORS.length], borderRadius: [4, 4, 0, 0] }
                }));
                charts.serverAnomalyComparisonChart.setOption(anomalyOption);

                const speedOption = { ...movementOption, xAxis: { type: 'category', data: ['平均速度'], axisLabel: { color: '#aaa' } } };
                speedOption.series = serverNames.map((server, i) => ({
                    name: server,
                    type: 'bar',
                    data: [data[server].avgMoveSpeed.toFixed(2)],
                    itemStyle: { color: COLORS[(i + 3) % COLORS.length], borderRadius: [4, 4, 0, 0] }
                }));
                charts.serverSpeedComparisonChart.setOption(speedOption);
            } catch (e) {
                console.error('加载服务器对比数据失败:', e);
            }
        }

        async function loadLevelComparisonData() {
            if (selectedLevels.length === 0) return;

            try {
                const hours = parseInt(document.getElementById('timeRange').value);
                const data = await fetch(`${API_BASE}/aggregate/comparison/levels?levels=${selectedLevels.join(',')}&hours=${hours}`)
                    .then(r => r.json());

                const indicators = [
                    { name: '移动数据', max: 10000 },
                    { name: '技能使用', max: 5000 },
                    { name: '任务完成', max: 1000 },
                    { name: '平均时长', max: 500 }
                ];

                const seriesData = Object.entries(data).map(([key, value], i) => ({
                    value: [
                        value.totalMovements,
                        value.totalSkills,
                        value.totalTasks,
                        value.avgSessionLength * 10
                    ],
                    name: `等级 ${value.level}`,
                    itemStyle: { color: COLORS[i % COLORS.length] },
                    lineStyle: { color: COLORS[i % COLORS.length] },
                    areaStyle: { color: COLORS[i % COLORS.length], opacity: 0.2 }
                }));

                const option = {
                    backgroundColor: 'transparent',
                    tooltip: { trigger: 'item' },
                    legend: {
                        data: seriesData.map(d => d.name),
                        textStyle: { color: '#aaa' },
                        bottom: 0
                    },
                    radar: {
                        indicator: indicators,
                        axisName: { color: '#aaa' },
                        splitArea: { areaStyle: { color: ['rgba(102, 126, 234, 0.05)', 'rgba(102, 126, 234, 0.1)'] } },
                        axisLine: { lineStyle: { color: 'rgba(102, 126, 234, 0.3)' } },
                        splitLine: { lineStyle: { color: 'rgba(102, 126, 234, 0.2)' } }
                    },
                    series: [{
                        type: 'radar',
                        data: seriesData
                    }]
                };

                charts.levelComparisonChart.setOption(option);
            } catch (e) {
                console.error('加载等级对比数据失败:', e);
            }
        }

        async function loadRecentAlerts(hours) {
            try {
                const data = await fetch(`${API_BASE}/anomaly/alerts/recent?hours=${hours}`).then(r => r.json());

                updateStats('totalAnomalies', data.length);

                const container = document.getElementById('recentAlertsList');

                if (data.length === 0) {
                    container.innerHTML = '<div style="text-align: center; color: #888; padding: 40px;">暂无异常告警</div>';
                    return;
                }

                const uniquePlayers = new Set(data.map(d => d.playerId)).size;
                updateStats('totalPlayers', uniquePlayers);

                container.innerHTML = data.slice(0, 8).map(d => `
                    <div class="alert-item ${d.severity >= 3 ? 'critical' : 'warning'}">
                        <div>
                            <span class="player">${d.playerName}</span>
                            <span class="rule">${d.ruleName}</span>
                        </div>
                        <div class="time">${new Date(d.createdAt).toLocaleString('zh-CN')}</div>
                        <div class="details">服务器: ${d.serverId}</div>
                    </div>
                `).join('');

                const typeCounts = {};
                const severityCounts = {};
                data.forEach(d => {
                    typeCounts[d.ruleCode] = (typeCounts[d.ruleCode] || 0) + 1;
                    severityCounts[d.severity] = (severityCounts[d.severity] || 0) + 1;
                });

                const typeOption = {
                    backgroundColor: 'transparent',
                    tooltip: { trigger: 'item' },
                    series: [{
                        type: 'pie',
                        radius: ['40%', '70%'],
                        data: Object.entries(typeCounts).map(([key, value], i) => ({
                            value, name: key,
                            itemStyle: { color: COLORS[i % COLORS.length] }
                        }))
                    }]
                };
                charts.anomalyTypeChart.setOption(typeOption);

                const severityLabels = { 1: '提示', 2: '警告', 3: '严重', 4: '致命' };
                const severityOption = {
                    backgroundColor: 'transparent',
                    tooltip: { trigger: 'item' },
                    series: [{
                        type: 'pie',
                        radius: ['40%', '70%'],
                        data: Object.entries(severityCounts).map(([key, value], i) => ({
                            value, name: severityLabels[key] || key,
                            itemStyle: { color: ['#4ade80', '#fbbf24', '#f59e0b', '#f87171'][parseInt(key) - 1] || COLORS[i] }
                        }))
                    }]
                };
                charts.anomalySeverityChart.setOption(severityOption);
            } catch (e) {
                console.error('加载异常告警失败:', e);
            }
        }

        async function loadAlerts() {
            const hours = parseInt(document.getElementById('timeRange').value);
            try {
                const data = await fetch(`${API_BASE}/anomaly/alerts/recent?hours=${hours}`).then(r => r.json());

                const container = document.getElementById('allAlertsList');

                if (data.length === 0) {
                    container.innerHTML = '<div style="text-align: center; color: #888; padding: 40px;">暂无异常告警</div>';
                    return;
                }

                container.innerHTML = data.map(d => `
                    <div class="alert-item ${d.severity >= 3 ? 'critical' : 'warning'}">
                        <div>
                            <span class="player">${d.playerName}</span>
                            <span class="rule">${d.ruleName}</span>
                            <span style="float: right; color: #888; font-size: 12px;">${d.status}</span>
                        </div>
                        <div class="time">${new Date(d.createdAt).toLocaleString('zh-CN')} | 服务器: ${d.serverId}</div>
                        <div class="details">${d.notes || '暂无备注'}</div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('加载告警列表失败:', e);
            }
        }

        async function loadRules() {
            try {
                const data = await fetch(`${API_BASE}/anomaly/rules`).then(r => r.json());
                allRules = data;

                const container = document.getElementById('rulesList');

                container.innerHTML = data.map(rule => `
                    <div class="rule-card">
                        <div class="rule-header">
                            <span class="rule-name">${rule.ruleName}</span>
                            <span class="rule-status ${rule.enabled ? 'enabled' : 'disabled'}">${rule.enabled ? '已启用' : '已禁用'}</span>
                        </div>
                        <div class="rule-desc">${rule.description || '暂无描述'}</div>
                        <div class="rule-desc">类型: ${rule.ruleType} | 严重程度: ${rule.severity}</div>
                        <div class="rule-actions">
                            <button class="btn" style="padding: 5px 12px; font-size: 12px;" onclick="editRule(${rule.id})">编辑</button>
                            <button class="btn" style="padding: 5px 12px; font-size: 12px; background: ${rule.enabled ? '#f59e0b' : '#10b981'};" onclick="toggleRule(${rule.id}, ${rule.enabled})">
                                ${rule.enabled ? '禁用' : '启用'}
                            </button>
                            <button class="btn" style="padding: 5px 12px; font-size: 12px; background: #f87171;" onclick="deleteRule(${rule.id})">删除</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('加载规则失败:', e);
            }
        }

        function openRuleModal(ruleId = null) {
            const modal = document.getElementById('ruleModal');
            modal.classList.add('active');

            if (ruleId) {
                const rule = allRules.find(r => r.id === ruleId);
                if (rule) {
                    document.getElementById('ruleId').value = rule.id;
                    document.getElementById('ruleName').value = rule.ruleName;
                    document.getElementById('ruleCode').value = rule.ruleCode;
                    document.getElementById('ruleDescription').value = rule.description || '';
                    document.getElementById('behaviorType').value = rule.ruleType;
                    document.getElementById('severity').value = rule.severity;
                    document.getElementById('conditionJson').value = rule.conditionJson;
                    document.getElementById('ruleEnabled').value = rule.enabled.toString();
                    document.getElementById('triggerAlert').value = rule.triggerAlert.toString();
                }
            } else {
                document.getElementById('ruleForm').reset();
                document.getElementById('ruleId').value = '';
            }
        }

        function closeRuleModal() {
            document.getElementById('ruleModal').classList.remove('active');
        }

        function editRule(ruleId) {
            openRuleModal(ruleId);
        }

        async function saveRule() {
            const ruleId = document.getElementById('ruleId').value;
            const rule = {
                ruleName: document.getElementById('ruleName').value,
                ruleCode: document.getElementById('ruleCode').value,
                description: document.getElementById('ruleDescription').value,
                ruleType: document.getElementById('behaviorType').value,
                severity: parseInt(document.getElementById('severity').value),
                conditionJson: document.getElementById('conditionJson').value,
                enabled: document.getElementById('ruleEnabled').value === 'true',
                triggerAlert: document.getElementById('triggerAlert').value === 'true'
            };

            try {
                let response;
                if (ruleId) {
                    response = await fetch(`${API_BASE}/anomaly/rules/${ruleId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(rule)
                    });
                } else {
                    response = await fetch(`${API_BASE}/anomaly/rules`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(rule)
                    });
                }

                if (response.ok) {
                    closeRuleModal();
                    loadRules();
                }
            } catch (e) {
                console.error('保存规则失败:', e);
            }
        }

        async function toggleRule(id, currentStatus) {
            try {
                await fetch(`${API_BASE}/anomaly/rules/${id}/toggle?enabled=${!currentStatus}`, {
                    method: 'PATCH'
                });
                loadRules();
            } catch (e) {
                console.error('切换规则状态失败:', e);
            }
        }

        async function deleteRule(id) {
            if (!confirm('确定要删除此规则吗？')) return;
            try {
                await fetch(`${API_BASE}/anomaly/rules/${id}`, { method: 'DELETE' });
                loadRules();
            } catch (e) {
                console.error('删除规则失败:', e);
            }
        }

        function updateStats(id, value) {
            const element = document.getElementById(id);
            if (element) {
                element.textContent = value.toLocaleString();
            }
        }

        function refreshAllData() {
            loadOverviewData();
            loadHeatmapData();
            loadServerComparisonData();
            loadLevelComparisonData();
            loadAlerts();
        }
    </script>
</body>
</html>
