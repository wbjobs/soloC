<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>剪贴板同步管理后台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    header {
      background: rgba(255, 255, 255, 0.95);
      padding: 24px 32px;
      border-radius: 16px;
      margin-bottom: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }
    h1 {
      color: #2d3748;
      font-size: 28px;
      font-weight: 700;
    }
    .subtitle {
      color: #718096;
      margin-top: 4px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: rgba(255, 255, 255, 0.95);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }
    .stat-card .value {
      font-size: 36px;
      font-weight: 700;
      color: #667eea;
    }
    .stat-card .label {
      color: #718096;
      font-size: 14px;
      margin-top: 4px;
    }
    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .section {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
    .section-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: #2d3748;
    }
    .refresh-btn {
      padding: 8px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    .refresh-btn:hover {
      background: #5a67d8;
    }
    .table-container {
      max-height: 500px;
      overflow-y: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 16px 24px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }
    th {
      background: #f7fafc;
      font-weight: 600;
      color: #4a5568;
      font-size: 14px;
      position: sticky;
      top: 0;
    }
    td {
      color: #2d3748;
      font-size: 14px;
    }
    tr:last-child td {
      border-bottom: none;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .status-dot.online {
      background: #48bb78;
      box-shadow: 0 0 8px #48bb78;
    }
    .status-dot.offline {
      background: #a0aec0;
    }
    .badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-text {
      background: #bee3f8;
      color: #2b6cb0;
    }
    .badge-image {
      background: #fef3c7;
      color: #d69e2e;
    }
    .badge-success {
      background: #c6f6d5;
      color: #276749;
    }
    .badge-error {
      background: #fed7d7;
      color: #c53030;
    }
    .empty {
      padding: 48px;
      text-align: center;
      color: #a0aec0;
    }
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border-top: 1px solid #e2e8f0;
    }
    .pagination button {
      padding: 8px 14px;
      border: 1px solid #e2e8f0;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .pagination button:hover:not(:disabled) {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }
    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .pagination button.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }
    .pagination-info {
      color: #718096;
      font-size: 14px;
    }
    @media (max-width: 1024px) {
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
      .content {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 640px) {
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 剪贴板同步管理后台</h1>
      <p class="subtitle">实时监控设备连接状态与同步日志</p>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="value" id="online-devices">0</div>
        <div class="label">在线设备</div>
      </div>
      <div class="stat-card">
        <div class="value" id="total-devices">0</div>
        <div class="label">总设备数</div>
      </div>
      <div class="stat-card">
        <div class="value" id="total-users">0</div>
        <div class="label">用户数量</div>
      </div>
      <div class="stat-card">
        <div class="value" id="sync-count">0</div>
        <div class="label">同步次数</div>
      </div>
    </div>

    <div class="content">
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">🖥️ 在线设备列表</h2>
          <button class="refresh-btn" onclick="loadDevices()">刷新</button>
        </div>
        <div class="table-container">
          <table id="devices-table">
            <thead>
              <tr>
                <th>设备名称</th>
                <th>用户</th>
                <th>连接时间</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="devices-tbody">
              <tr><td colspan="4" class="empty">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <h2 class="section-title">📝 同步日志</h2>
          <button class="refresh-btn" onclick="refreshLogs()">刷新</button>
        </div>
        <div class="table-container">
          <table id="logs-table">
            <thead>
              <tr>
                <th>时间</th>
                <th>类型</th>
                <th>来源</th>
                <th>目标</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="logs-tbody">
              <tr><td colspan="5" class="empty">加载中...</td></tr>
            </tbody>
          </table>
        </div>
        <div id="logs-pagination" class="pagination"></div>
      </div>
    </div>
  </div>

  <script>
    let currentPage = 1;
    const pageSize = 50;
    let totalLogs = 0;

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleString('zh-CN', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function truncateId(id) {
      if (!id) return '-';
      return id.substring(0, 8) + '...';
    }

    async function loadDevices() {
      try {
        const [devicesRes, usersRes] = await Promise.all([
          fetch('/api/devices'),
          fetch('/api/users')
        ]);
        const devicesData = await devicesRes.json();
        const usersData = await usersRes.json();

        const userMap = {};
        usersData.users.forEach(u => {
          userMap[u.userId] = u.username;
        });

        document.getElementById('online-devices').textContent = devicesData.devices.filter(d => 
          (new Date().getTime() - d.lastActiveAt) < 30000
        ).length;
        document.getElementById('total-devices').textContent = devicesData.devices.length;
        document.getElementById('total-users').textContent = usersData.users.length;

        const tbody = document.getElementById('devices-tbody');
        if (devicesData.devices.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="empty">暂无设备</td></tr>';
          return;
        }

        tbody.innerHTML = devicesData.devices.map(device => {
          const isOnline = (new Date().getTime() - device.lastActiveAt) < 30000;
          return `
            <tr>
              <td><strong>${device.deviceName}</strong><br><small>${truncateId(device.deviceId)}</small></td>
              <td>${userMap[device.userId] || device.userId}</td>
              <td>${formatTime(device.connectedAt)}</td>
              <td>
                <span class="status">
                  <span class="status-dot ${isOnline ? 'online' : 'offline'}"></span>
                  ${isOnline ? '在线' : '离线'}
                </span>
              </td>
            </tr>
          `;
        }).join('');
      } catch (error) {
        console.error('Failed to load devices:', error);
      }
    }

    async function loadLogs(page = 1) {
      try {
        const res = await fetch(`/api/logs?page=${page}&pageSize=${pageSize}`);
        const data = await res.json();
        
        currentPage = data.pagination.page;
        totalLogs = data.pagination.total;
        
        document.getElementById('sync-count').textContent = totalLogs;

        const tbody = document.getElementById('logs-tbody');
        if (data.logs.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="empty">暂无同步记录</td></tr>';
        } else {
          tbody.innerHTML = data.logs.map(log => `
            <tr>
              <td>${formatTime(log.timestamp)}</td>
              <td><span class="badge badge-${log.contentType}">${log.contentType}</span></td>
              <td>${truncateId(log.fromDeviceId)}</td>
              <td>${truncateId(log.toDeviceId)}</td>
              <td><span class="badge ${log.success ? 'badge-success' : 'badge-error'}">${log.success ? '成功' : '失败'}</span></td>
            </tr>
          `).join('');
        }

        renderPagination(data.pagination);
      } catch (error) {
        console.error('Failed to load logs:', error);
      }
    }

    function renderPagination(pagination) {
      const container = document.getElementById('logs-pagination');
      if (pagination.total <= pageSize) {
        container.innerHTML = `<span class="pagination-info">共 ${pagination.total} 条记录</span>`;
        return;
      }

      const { page, totalPages, hasMore, total } = pagination;
      const start = (page - 1) * pageSize + 1;
      const end = Math.min(page * pageSize, total);

      let buttons = '';
      
      buttons += `<button ${page === 1 ? 'disabled' : ''} onclick="goToPage(${page - 1})">上一页</button>`;
      
      const maxVisiblePages = 5;
      let startPage = Math.max(1, page - Math.floor(maxVisiblePages / 2));
      let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
      
      if (endPage - startPage < maxVisiblePages - 1) {
        startPage = Math.max(1, endPage - maxVisiblePages + 1);
      }

      for (let i = startPage; i <= endPage; i++) {
        buttons += `<button ${i === page ? 'class="active"' : ''} onclick="goToPage(${i})">${i}</button>`;
      }

      buttons += `<button ${!hasMore ? 'disabled' : ''} onclick="goToPage(${page + 1})">下一页</button>`;

      container.innerHTML = `
        <span class="pagination-info">显示 ${start}-${end} / 共 ${total} 条</span>
        ${buttons}
        <span class="pagination-info">第 ${page} / ${totalPages} 页</span>
      `;
    }

    function goToPage(page) {
      loadLogs(page);
    }

    function refreshLogs() {
      loadLogs(1);
    }

    function init() {
      loadDevices();
      loadLogs(1);
      setInterval(loadDevices, 5000);
      setInterval(() => loadLogs(currentPage), 10000);
    }

    init();
  </script>
</body>
</html>
